app = "private-chat-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# 1. API Service (Standard HTTPS on port 443)
[[services]]
  internal_port = 9000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

# 2. WebSocket Service (Available publicly on port 8080)
[[services]]
  internal_port = 9001
  protocol = "tcp"

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 8080
